<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Franvarobot — Repos</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card-hover: #1c2333;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #e6edf3;
    --muted: #8b949e;
    --add-border: #30363d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }

  .header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    font-weight: 300;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    max-width: 1000px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.4rem;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(88, 166, 255, 0.1);
  }

  .card-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent);
  }

  .card-desc {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.4;
    flex-grow: 1;
  }

  .card-meta {
    display: flex;
    gap: 0.8rem;
    align-items: center;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .lang-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }

  .lang-dot.html { background: #e34c26; }
  .lang-dot.powershell { background: #012456; }
  .lang-dot.javascript { background: #f1e05a; }
  .lang-dot.python { background: #3572a5; }
  .lang-dot.typescript { background: #3178c6; }
  .lang-dot.default { background: var(--muted); }

  .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 2;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .card:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #f85149; background: rgba(248, 81, 73, 0.1); }

  .add-card {
    border: 2px dashed var(--add-border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    min-height: 120px;
    transition: all 0.2s ease;
  }

  .add-card:hover {
    border-color: var(--accent2);
    background: rgba(63, 185, 80, 0.05);
    transform: translateY(-2px);
  }

  .add-icon {
    font-size: 2.5rem;
    color: var(--muted);
    font-weight: 300;
    transition: color 0.2s;
  }

  .add-card:hover .add-icon { color: var(--accent2); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    width: 90%;
    max-width: 400px;
  }

  .modal h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
    color: var(--accent);
  }

  .modal input, .modal select {
    width: 100%;
    padding: 0.7rem 0.9rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.85rem;
    margin-bottom: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal input:focus, .modal select:focus { border-color: var(--accent); }

  .modal select option { background: var(--bg); color: var(--text); }

  .modal-actions {
    display: flex;
    gap: 0.6rem;
    justify-content: flex-end;
    margin-top: 0.6rem;
  }

  .btn {
    padding: 0.5rem 1.2rem;
    border: none;
    border-radius: 6px;
    font-family: 'Sora', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent2);
    color: #000;
  }

  .btn-primary:hover { filter: brightness(1.15); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-cancel {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-cancel:hover { border-color: var(--muted); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.4rem;
    font-size: 0.85rem;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 200;
    max-width: 90%;
    text-align: center;
    pointer-events: none;
  }

  .toast.active {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error { border-color: #f85149; }
  .toast.success { border-color: var(--accent2); }

  .error-msg {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
    font-size: 0.9rem;
  }

  /* Token bar */
  .token-bar {
    max-width: 1000px;
    margin: 0 auto 1rem;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    justify-content: flex-end;
  }

  .token-bar button {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .token-bar button:hover { border-color: var(--accent); color: var(--text); }

  .token-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .token-status.connected { color: var(--accent2); }
</style>
</head>
<body>

<div class="header">
  <h1>My Projects Page</h1>
  <p>Useful Links and Shortcuts</p>
</div>

<div class="token-bar">
  <span class="token-status" id="token-status"></span>
  <button id="token-btn" onclick="promptToken()"></button>
</div>

<div class="grid" id="grid">
  <div class="error-msg">Loading...</div>
</div>

<div class="toast" id="toast"></div>

<!-- Add modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>+ Add Link</h2>
    <input type="text" id="inp-name" placeholder="Name">
    <input type="text" id="inp-url" placeholder="https://franvarobot.github.io/...">
    <input type="text" id="inp-desc" placeholder="Description (optional)">
    <select id="inp-lang">
      <option value="">Language (optional)</option>
      <option value="HTML">HTML</option>
      <option value="JavaScript">JavaScript</option>
      <option value="TypeScript">TypeScript</option>
      <option value="Python">Python</option>
      <option value="PowerShell">PowerShell</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" id="add-btn" onclick="addLink()">Add</button>
    </div>
  </div>
</div>

<!-- Token modal -->
<div class="modal-overlay" id="token-modal">
  <div class="modal">
    <h2>GitHub Token</h2>
    <input type="password" id="inp-token" placeholder="ghp_... or github_pat_...">
    <p style="font-size:0.75rem;color:var(--muted);margin-bottom:0.8rem;">Fine-grained token scoped to <strong>Franvarobot/projects</strong> with Contents read/write. Stored in localStorage only.</p>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeTokenModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveToken()">Save</button>
    </div>
  </div>
</div>

<script>
  const OWNER = 'Franvarobot';
  const REPO = 'projects';
  const FILE_PATH = 'links.json';
  const API = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;

  let currentLinks = [];
  let fileSha = null;

  function getToken() { return localStorage.getItem('gh-token') || ''; }
  function setToken(t) { localStorage.setItem('gh-token', t); }

  function updateTokenUI() {
    const t = getToken();
    const status = document.getElementById('token-status');
    const btn = document.getElementById('token-btn');
    if (t) {
      status.textContent = 'connected';
      status.className = 'token-status connected';
      btn.textContent = 'change token';
    } else {
      status.textContent = 'read-only';
      status.className = 'token-status';
      btn.textContent = 'set token';
    }
  }

  function promptToken() {
    document.getElementById('token-modal').classList.add('active');
    document.getElementById('inp-token').focus();
  }

  function closeTokenModal() {
    document.getElementById('token-modal').classList.remove('active');
    document.getElementById('inp-token').value = '';
  }

  function saveToken() {
    const t = document.getElementById('inp-token').value.trim();
    if (t) setToken(t);
    closeTokenModal();
    updateTokenUI();
    loadAndRender();
  }

  function langClass(lang) {
    if (!lang) return 'default';
    return lang.toLowerCase().replace(/[^a-z]/g, '') || 'default';
  }

  function showToast(msg, type = '', duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast active ' + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = 'toast', duration);
  }

  async function fetchLinks() {
    const token = getToken();
    const headers = {};
    if (token) headers['Authorization'] = `Bearer ${token}`;

    // Try API first (gives us sha for writes)
    if (token) {
      try {
        const res = await fetch(API, { headers });
        if (res.ok) {
          const data = await res.json();
          fileSha = data.sha;
          const content = atob(data.content.replace(/\n/g, ''));
          return JSON.parse(content);
        }
      } catch (e) {}
    }

    // Fallback: fetch raw file from Pages
    const res = await fetch('links.json?' + Date.now());
    if (!res.ok) throw new Error('Failed to load');
    fileSha = null;
    return res.json();
  }

  async function writeLinks(links) {
    const token = getToken();
    if (!token) {
      showToast('Set a GitHub token to save changes', 'error');
      return false;
    }

    // Get latest sha first
    try {
      const res = await fetch(API, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.ok) {
        const data = await res.json();
        fileSha = data.sha;
      }
    } catch (e) {}

    if (!fileSha) {
      showToast('Could not get file SHA — check your token', 'error');
      return false;
    }

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(links, null, 2) + '\n')));
    const res = await fetch(API, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: 'Update links.json',
        content: content,
        sha: fileSha,
      }),
    });

    if (res.ok) {
      const data = await res.json();
      fileSha = data.content.sha;
      return true;
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.message || 'Failed to save', 'error');
      return false;
    }
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    currentLinks.forEach((r, i) => {
      const a = document.createElement('a');
      a.href = r.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.className = 'card';
      a.innerHTML = `
        <button class="delete-btn" title="Remove">−</button>
        <div class="card-name">${r.name}</div>
        <div class="card-desc">${r.desc || 'No description'}</div>
        <div class="card-meta">
          ${r.lang ? `<span><span class="lang-dot ${langClass(r.lang)}"></span>${r.lang}</span>` : ''}
        </div>
      `;
      a.querySelector('.delete-btn').addEventListener('click', async e => {
        e.preventDefault();
        e.stopPropagation();
        if (!getToken()) {
          showToast('Set a GitHub token to delete links', 'error');
          return;
        }
        if (!confirm(`Delete "${r.name}"?`)) return;
        currentLinks.splice(i, 1);
        const ok = await writeLinks(currentLinks);
        if (ok) {
          showToast(`Deleted ${r.name}`, 'success');
          render();
        } else {
          await loadAndRender();
        }
      });
      grid.appendChild(a);
    });

    const add = document.createElement('div');
    add.className = 'card add-card';
    add.innerHTML = '<span class="add-icon">+</span>';
    add.addEventListener('click', () => {
      if (!getToken()) {
        showToast('Set a GitHub token first to add links', 'error');
        return;
      }
      document.getElementById('add-modal').classList.add('active');
      document.getElementById('inp-name').focus();
    });
    grid.appendChild(add);
  }

  function closeAddModal() {
    document.getElementById('add-modal').classList.remove('active');
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-url').value = '';
    document.getElementById('inp-desc').value = '';
    document.getElementById('inp-lang').value = '';
  }

  async function addLink() {
    const name = document.getElementById('inp-name').value.trim();
    const url = document.getElementById('inp-url').value.trim();
    const desc = document.getElementById('inp-desc').value.trim();
    const lang = document.getElementById('inp-lang').value;
    if (!name || !url) return;

    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const entry = { name, url };
    if (desc) entry.desc = desc;
    if (lang) entry.lang = lang;
    currentLinks.push(entry);

    const ok = await writeLinks(currentLinks);
    btn.disabled = false;
    btn.textContent = 'Add';

    if (ok) {
      showToast(`Added ${name}`, 'success');
      closeAddModal();
      render();
    } else {
      currentLinks.pop();
    }
  }

  async function loadAndRender() {
    const grid = document.getElementById('grid');
    try {
      currentLinks = await fetchLinks();
      render();
    } catch (e) {
      grid.innerHTML = '<div class="error-msg">Failed to load links.json</div>';
    }
  }

  // Modal close handlers
  document.getElementById('add-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeAddModal();
  });
  document.getElementById('token-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeTokenModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeAddModal(); closeTokenModal(); }
  });

  updateTokenUI();
  loadAndRender();
</script>
</body>
</html>
