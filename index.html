<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Franvarobot — Repos</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card-hover: #1c2333;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #e6edf3;
    --muted: #8b949e;
    --add-border: #30363d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }

  .header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    font-weight: 300;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    max-width: 1000px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.4rem;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(88, 166, 255, 0.1);
  }

  .card-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent);
  }

  .card-desc {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.4;
    flex-grow: 1;
  }

  .card-meta {
    display: flex;
    gap: 0.8rem;
    align-items: center;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .lang-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }

  .lang-dot.html { background: #e34c26; }
  .lang-dot.powershell { background: #012456; }
  .lang-dot.javascript { background: #f1e05a; }
  .lang-dot.python { background: #3572a5; }
  .lang-dot.typescript { background: #3178c6; }
  .lang-dot.default { background: var(--muted); }

  .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 2;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .card:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #f85149; background: rgba(248, 81, 73, 0.1); }

  .add-card {
    border: 2px dashed var(--add-border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    min-height: 120px;
    transition: all 0.2s ease;
  }

  .add-card:hover {
    border-color: var(--accent2);
    background: rgba(63, 185, 80, 0.05);
    transform: translateY(-2px);
  }

  .add-icon {
    font-size: 2.5rem;
    color: var(--muted);
    font-weight: 300;
    transition: color 0.2s;
  }

  .add-card:hover .add-icon { color: var(--accent2); }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.4rem;
    font-size: 0.85rem;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 200;
    max-width: 90%;
    text-align: center;
    pointer-events: none;
  }

  .toast.active {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
  }

  .error-msg {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Franvarobot</h1>
  <p>GitHub Repositories</p>
</div>

<div class="grid" id="grid">
  <div class="error-msg">Loading...</div>
</div>

<div class="toast" id="toast"></div>

<script>
  function langClass(lang) {
    if (!lang) return 'default';
    return lang.toLowerCase().replace(/[^a-z]/g, '') || 'default';
  }

  function showToast(html, duration = 4000) {
    const t = document.getElementById('toast');
    t.innerHTML = html;
    t.classList.add('active');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('active'), duration);
  }

  async function loadAndRender() {
    const grid = document.getElementById('grid');
    let repos;

    try {
      const res = await fetch('links.json?' + Date.now());
      repos = await res.json();
    } catch (e) {
      grid.innerHTML = '<div class="error-msg">Failed to load links.json</div>';
      return;
    }

    grid.innerHTML = '';

    repos.forEach(r => {
      const a = document.createElement('a');
      a.href = r.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.className = 'card';
      a.innerHTML = `
        <button class="delete-btn" title="Remove">−</button>
        <div class="card-name">${r.name}</div>
        <div class="card-desc">${r.desc || 'No description'}</div>
        <div class="card-meta">
          ${r.lang ? `<span><span class="lang-dot ${langClass(r.lang)}"></span>${r.lang}</span>` : ''}
        </div>
      `;
      a.querySelector('.delete-btn').addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        showToast(`To remove <strong>${r.name}</strong>, delete its entry from <code>links.json</code> and push.`);
      });
      grid.appendChild(a);
    });

    const add = document.createElement('div');
    add.className = 'card add-card';
    add.innerHTML = '<span class="add-icon">+</span>';
    add.addEventListener('click', () => {
      showToast('To add a link, add an entry to <code>links.json</code> in your repo and push.');
    });
    grid.appendChild(add);
  }

  loadAndRender();
</script>
</body>
</html>
